<div class="app-layout" [class.sidebar-open]="sidebarOpen()">
  <!-- Mobile top bar -->
  <header class="mobile-topbar">
    <button
      type="button"
      class="menu-toggle"
      [attr.aria-expanded]="sidebarOpen()"
      aria-controls="app-sidebar"
      aria-label="Toggle navigation"
      (click)="toggleSidebar()"
    >
      <span class="menu-icon" aria-hidden="true">
        <span></span><span></span><span></span>
      </span>
    </button>
    <a routerLink="/" class="mobile-brand" (click)="closeSidebar()" aria-label="Go to home">
      <img src="logo.svg" alt="" class="mobile-logo" />
      <span>PerfectUI</span>
    </a>

    <!-- Compact theme picker shown only on small screens -->
    <div class="mobile-theme-picker">
      <span class="mobile-theme-preview" aria-hidden="true">
        <span class="color-dot" [style.background-color]="getCurrentTheme().primaryColor"></span>
        <span class="color-dot" [style.background-color]="getCurrentTheme().accentColor"></span>
      </span>
      <select
        class="mobile-theme-dropdown"
        aria-label="Select theme"
        [ngModel]="currentThemeId"
        (ngModelChange)="onThemeChange($event)"
      >
        @for (theme of themes; track theme.id) {
          <option [value]="theme.id">{{ theme.name }}</option>
        }
      </select>
    </div>

    <button
      type="button"
      class="mobile-dark-toggle theme-toggle-btn"
      [class.is-dark]="isDarkMode()"
      (click)="toggleDarkMode()"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <span class="theme-icon-stack" aria-hidden="true">
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="20" height="20">
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
          <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="2" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
            <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
            <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
            <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
            <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
          </g>
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="20" height="20">
          <path
            d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"
            fill="currentColor"
          />
        </svg>
      </span>
    </button>
  </header>

  <!-- Backdrop for mobile drawer -->
  <div
    class="sidebar-backdrop"
    [class.visible]="sidebarOpen()"
    (click)="closeSidebar()"
    aria-hidden="true"
  ></div>

  <nav class="sidebar" id="app-sidebar" [class.open]="sidebarOpen()">
    <a routerLink="/" class="sidebar-header" (click)="closeSidebar()" aria-label="Go to home">
      <div class="logo-container">
        <img src="logo.svg" alt="PerfectUI Logo" class="logo" />
      </div>
      <h1>PerfectUI</h1>
      <p>Angular Component Library</p>
    </a>

    <!-- Global Theme Selector -->
    <div class="theme-selector">
      <div class="theme-selector-header">
        <span class="theme-label">🎨 Theme</span>
        <div class="theme-preview">
          <span class="color-dot" [style.background-color]="getCurrentTheme().primaryColor"></span>
          <span class="color-dot" [style.background-color]="getCurrentTheme().accentColor"></span>
        </div>
      </div>
      <div class="theme-dropdown-container">
        <select
          class="theme-dropdown"
          [ngModel]="currentThemeId"
          (ngModelChange)="onThemeChange($event)"
        >
          @for (theme of themes; track theme.id) {
            <option [value]="theme.id">{{ theme.name }}</option>
          }
        </select>
        <button class="dark-mode-toggle theme-toggle-btn" [class.is-dark]="isDarkMode()" (click)="toggleDarkMode()" [title]="isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'" [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
          <span class="theme-icon-stack" aria-hidden="true">
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="18" height="18">
              <circle cx="12" cy="12" r="4" fill="currentColor"/>
              <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="12" y1="2" x2="12" y2="5"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
                <line x1="2" y1="12" x2="5" y2="12"/>
                <line x1="19" y1="12" x2="22" y2="12"/>
                <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
                <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
                <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
                <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
              </g>
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="18" height="18">
              <path
                d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"
                fill="currentColor"
              />
            </svg>
          </span>
        </button>
      </div>
    </div>

    <div class="nav-label">Components</div>
    <ul class="nav-list scroll-area">
      @for (item of navItems; track item.path) {
        <li>
          <a [routerLink]="item.path" routerLinkActive="active" (click)="closeSidebar()">
            <span class="nav-text">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>

    <div class="sidebar-footer">
      <a [href]="coreNpmUrl" target="_blank" rel="noopener noreferrer" class="core-badge">
        <svg class="npm-icon" viewBox="0 0 780 250">
          <path d="M240,250h100v-50h100V0H240V250z M340,50h50v100h-50V50z M480,0v200h100V50h50v150h50V50h50v150h50V0H480z M0,200h100V50h50v150h50V0H0V200z"/>
        </svg>
        <span class="core-name">{{ coreVersion }}</span>
      </a>

      <a [href]="externalLinks[0].url" target="_blank" rel="noopener noreferrer" class="github-link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        {{ externalLinks[0].label }}
      </a>
    </div>
  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
